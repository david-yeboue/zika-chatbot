worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Sécurité
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header X-XSS-Protection "1; mode=block"   always;
    add_header Referrer-Policy "strict-origin"    always;

    # ── Redirection HTTP → HTTPS ───────────────────────────────────────────
    server {
        listen 80;
        server_name chat.ect.ci www.ect.ci ect.ci;
        return 301 https://$host$request_uri;
    }

    # ── Serveur HTTPS principal ────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name chat.ect.ci www.ect.ci ect.ci;

        # ── Certificats SSL (Let's Encrypt ou autre) ──────────────────────
        # Remplacer par les vrais chemins après obtention du certificat
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;

        # ── Routes API → Backend Node.js ──────────────────────────────────
        location /api/ {
            proxy_pass         http://zika-backend:3001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;
        }

        # ── Frontend React (build statique) ───────────────────────────────
        location / {
            proxy_pass         http://zika-frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
